<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTour360° - Smart Tourist Safety Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; }
        .gradient-blue { background: linear-gradient(135deg, #1E1E2F 0%, #284b4b 50%, #0e383a 100%); }
        .fade-in-up { animation: fadeInUp 0.8s ease-out; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(300px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
