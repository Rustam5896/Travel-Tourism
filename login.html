<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SafeTour360°</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-900">
    <!-- Navbar (simple) -->
    <nav class="bg-slate-800/95 backdrop-blur-md shadow-2xl fixed w-full top-0 z-50 border-b border-slate-600">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center hover:scale-105 transition duration-300">
                        <i class="fas fa-shield-alt text-blue-400 text-2xl mr-2"></i>
                        <span class="text-xl font-bold text-slate-100">SafeTour360°</span>
                    </a>
                </div>

                <!-- Desktop links -->
                <div class="hidden md:flex items-center space-x-1">
                    <a href="../index.html" class="nav-link text-slate-300 hover:text-blue-400 font-medium transition duration-300 px-4 py-2 rounded-lg hover:bg-slate-700">
                    
                    </a>
                    <a href="digital-id.html" class="nav-link text-slate-300 hover:text-blue-400 font-medium transition duration-300 px-4 py-2 rounded-lg hover:bg-slate-700">
                       
                    </a>
                    <a href="dashboard.html" class="nav-link text-slate-300 hover:text-blue-400 font-medium transition duration-300 px-4 py-2 rounded-lg hover:bg-slate-700">
                        
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sign In Page -->
    <main class="min-h-screen flex items-center justify-center px-4 pt-20">
        <div class="w-full max-w-5xl flex flex-col lg:flex-row items-center gap-12">
            <!-- Left: Branding -->
            <section class="hidden lg:flex lg:w-1/2 flex-col justify-center items-center pr-4">
                <div class="text-center">
                    <div class="text-blue-400 text-6xl mb-6">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h1 class="text-4xl font-bold text-white mb-4">SafeTour360°</h1>
                    <p class="text-slate-300 text-lg mb-8">
                        Your Trusted Tourist Safety Companion
                    </p>
                    <div class="space-y-4 text-slate-400 text-left">
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-400 mr-3"></i>
                            <span>Real-time Safety Alerts</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-400 mr-3"></i>
                            <span>Digital Tourist ID</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-400 mr-3"></i>
                            <span>Emergency Support 24/7</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-400 mr-3"></i>
                            <span>Blockchain Secured</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right: Sign In form -->
            <section class="w-full lg:w-1/2 max-w-md">
                <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-white/20">
                    <!-- Mobile logo -->
                    <div class="lg:hidden text-center mb-8">
                        <div class="text-blue-400 text-4xl mb-3">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-white">SafeTour360°</h1>
                    </div>

                    <!-- Heading -->
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                        <p class="text-slate-300">Sign in to your account to continue</p>
                    </div>

                    <!-- Error box -->
                    <div id="errorBox" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
                        <p class="text-red-300 text-sm">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span id="errorMessage"></span>
                        </p>
                    </div>

                    <!-- Sign In form -->
                    <form id="loginForm" class="space-y-5">
                        <div>
                            <label class="block text-slate-200 text-sm font-semibold mb-2">
                                Email
                            </label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your email"
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition duration-300"
                                required
                            />
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-slate-200 text-sm font-semibold">
                                    Password
                                </label>
                                <a href="../index.html#contact" class="text-blue-400 hover:text-blue-300 text-xs font-medium transition duration-300">
                                    Need help?
                                </a>
                            </div>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition duration-300"
                                required
                            />
                        </div>

                        <button
                            type="submit"
                            id="loginButton"
                            class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3 rounded-lg transition duration-300 transform hover:scale-105 flex items-center justify-center gap-2 mt-6"
                        >
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Sign In</span>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="my-6 flex items-center">
                        <div class="flex-grow border-t border-slate-600/50"></div>
                        <span class="px-4 text-slate-400 text-sm">Or</span>
                        <div class="flex-grow border-t border-slate-600/50"></div>
                    </div>

                    <!-- Simple Create Account form (only email + password) -->
                    <div class="mt-4">
                        <h3 class="text-center text-slate-200 font-semibold mb-4">Create a New Account</h3>
                        <form id="registerForm" class="space-y-4">
                            <div>
                                <label class="block text-slate-200 text-sm font-semibold mb-2">
                                    Email
                                </label>
                                <input
                                    type="email"
                                    id="regEmail"
                                    name="regEmail"
                                    placeholder="Enter your email"
                                    class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition duration-300"
                                    required
                                />
                            </div>
                            <div>
                                <label class="block text-slate-200 text-sm font-semibold mb-2">
                                    Password
                                </label>
                                <input
                                    type="password"
                                    id="regPassword"
                                    name="regPassword"
                                    placeholder="Create a password"
                                    class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition duration-300"
                                    required
                                />
                            </div>
                            <div>
                                <label class="block text-slate-200 text-sm font-semibold mb-2">
                                    Confirm Password
                                </label>
                                <input
                                    type="password"
                                    id="regPasswordConfirm"
                                    name="regPasswordConfirm"
                                    placeholder="Re-enter password"
                                    class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition duration-300"
                                    required
                                />
                            </div>
                            <button
                                type="submit"
                                id="registerButton"
                                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition duration-300 transform hover:scale-105 flex items-center justify-center gap-2"
                            >
                                <i class="fas fa-user-plus"></i>
                                <span>Create Account</span>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-6 text-slate-400 text-xs">
                    <p>Secure • Private • Trusted</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');
        const registerButton = document.getElementById('registerButton');

        function showError(message) {
            if (!errorBox || !errorMessage) return;
            errorMessage.textContent = message;
            errorBox.classList.remove('hidden');
        }

        function clearError() {
            if (!errorBox) return;
            errorBox.classList.add('hidden');
            errorMessage.textContent = '';
        }

        function getStoredUsers() {
            try {
                const raw = localStorage.getItem('safetour_users');
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                console.warn('Unable to parse saved users', e);
                return [];
            }
        }

        function saveUsers(users) {
            localStorage.setItem('safetour_users', JSON.stringify(users));
        }

        async function handleLogin(event) {
            event.preventDefault();
            clearError();

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            // Find user in localStorage (simple front-end auth)
            const users = getStoredUsers();
            const found = users.find(u => u.email === email && u.password === password);

            if (!found) {
                showError('Invalid email or password. Please try again or create a new account.');
                return;
            }

            // Save current user session
            const currentUser = {
                id: found.id,
                email: found.email,
                name: found.name || found.email
            };
            localStorage.setItem('safeTourUser', JSON.stringify(currentUser));

            // Go inside app (home/dashboard)
            window.location.href = 'index.html';
        }

        if (form) {
            form.addEventListener('submit', handleLogin);
        }

        async function handleRegister(event) {
            event.preventDefault();
            clearError();

            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const passwordConfirm = document.getElementById('regPasswordConfirm').value.trim();

            if (!email || !password || !passwordConfirm) {
                showError('Please fill in all fields for registration.');
                return;
            }

            if (!email.includes('@')) {
                showError('Please enter a valid email address.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Passwords do not match.');
                return;
            }

            registerButton.disabled = true;
            registerButton.classList.add('opacity-75', 'cursor-not-allowed');
            registerButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Creating...</span>';

            try {
                const users = getStoredUsers();
                if (users.some(u => u.email === email)) {
                    showError('This email is already registered. Please sign in instead.');
                    return;
                }

                const newUser = {
                    id: Date.now().toString(),
                    email,
                    password
                };
                users.push(newUser);
                saveUsers(users);

                const currentUser = { id: newUser.id, email: newUser.email, name: newUser.email };
                localStorage.setItem('safeTourUser', JSON.stringify(currentUser));

                // After registration, send user inside app
                window.location.href = 'index.html';
            } finally {
                registerButton.disabled = false;
                registerButton.classList.remove('opacity-75', 'cursor-not-allowed');
                registerButton.innerHTML = '<i class="fas fa-user-plus"></i><span>Create Account</span>';
            }
        }

        if (registerForm) {
            registerForm.addEventListener('submit', handleRegister);
        }
    </script>
</body>
</html>
